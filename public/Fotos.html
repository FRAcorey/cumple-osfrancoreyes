<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos</title>
        <link rel="stylesheet" href="Flash.css">
</head>
    <body>

    <div>Aqui podras subir tus fotos y ver las fotos que te saques en el cumpleaños</div>
    <h2>Subir una imagen</h2>

<form id="formulario" enctype="multipart/form-data">

    <button type="button" onclick="document.getElementById('archivo').click()">
        Elegir foto
    </button>

    <input type="file" id="archivo" name="fotos" accept="image/*" multiple hidden onchange="mostrarImagen(event)">

    <br><br>

    <img id="preview" width="200">

    <br><br>

    <button type="submit">Subir al servidor</button>

</form>

        <h2>Galería</h2>
        <div id="galeria"></div>

    <script>

        function mostrarImagen(event) {
        const img = document.getElementById("preview");
        img.src = URL.createObjectURL(event.target.files[0]);
        }
    </script>
    <script>
const form = document.getElementById("formulario");

form.addEventListener("submit", async (e) => {
    e.preventDefault(); // evita que cambie de página

    const formData = new FormData(form);

    const res = await fetch("/Fotos", {
        method: "POST",
        body: formData
    });

    const texto = await res.text();

    // 🔥 ALERTA
    alert("Imagen subida correctamente. Para que se vea en la galería, recarga la página.");

    // limpiar input
    form.reset();

    // recargar galería
    cargarImagenes();
    });
    </script>


    </body>
</html>
