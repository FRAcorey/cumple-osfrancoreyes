<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos</title>
        <link rel="stylesheet" href="Feliz.css">
</head>
    <body>

    <div>Aqui podras subir tus fotos y ver las fotos que te saques en el cumpleaños</div>
    <h2 class="text2">Subir una imagen</h2>

<form id="formulario" enctype="multipart/form-data">

    <button type="button" onclick="document.getElementById('archivo').click()">
        Elegir la foto
    </button>

    <input type="file" id="archivo" name="fotos" accept="image/*" style="display:none;" onchange="mostrarImagen(event)">

    <br><br>

    <img id="preview" width="200">

    <br><br>

    <button type="submit">Subir la imagen</button>

</form>

        <h2 class="text2">Galería</h2>
        <div id="galeria"></div>

    <script>

        function mostrarImagen(event) {
    const file = event.target.files[0];

    if (!file) return;

    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);
}
    </script>

    <script>
    async function cargarImagenes() {
    const res = await fetch("/imagenes");
    const imagenes = await res.json();

    const galeria = document.getElementById("galeria");
    galeria.innerHTML = ""; // limpiar antes

    imagenes.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.width = 200;
        galeria.appendChild(img);
    });
}

// 👇 esto carga al abrir la página
cargarImagenes();

const form = document.getElementById("formulario");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    await fetch("/Fotos", {
        method: "POST",
        body: formData
    });

    alert("Imagen subida correctamente. Recargando galería...");

    form.reset();

    // 👇 recargar galería
    cargarImagenes();
});
    </script>


    </body>
</html>
