<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Feliz.css">
    <title>Asistencia</title>
</head>
<body>

<div>
    <h1>Confirme su asistencia</h1>
    <p>¿Vas a asistir al cumpleaños?</p>
    <p>Por favor, confirma tu asistencia para ayudar a planear el evento. No es necesario que respondas ahora mismo, pero antes si es antes del 25 de mayo mejor.</p>
</div>


<form id="formAsistencia">
    <button type="submit" data-valor="true">Sí voy </button>
    <button type="submit" data-valor="false">No voy </button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cliente = supabase.createClient(
    "https://fjiabjaovullgvzchgxy.supabase.co",
    "sb_publishable_IKlz5qC_uerRcV9JD9qkwg_Q8wXIKxQ"
    );
});

const form = document.getElementById("formAsistencia");

form.addEventListener("click", async (e) => {
    if (e.target.tagName === "BUTTON") {

        const valor = e.target.dataset.valor === "true";

        const { error } = await cliente
            .from("asistencia") // o "nombres" si no la cambiaste
            .insert([{ asiste: valor }]);

        if (error) {
            console.log(error);
            alert("Error al confirmar asistencia");
        } else {
            alert(valor ? "Confirmaste asistencia " : "Ok, no asistís ");
        }
    }
});
</script>

</body>
</html>
