<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Feliz.css">
    <title>Asistencia</title>
</head>
<body>

<div>
    
    <p class="text-asiste">¿Vas a asistir al cumpleaños?</p>
    <p class="text-asiste">Por favor, confirma tu asistencia para ayudar a planear el evento. No es necesario que respondas ahora mismo. Agradesco que confirmes antes del 25 de mayo.</p>
    <br><br>
    <p class="text-asiste">Aviso⚠️: No le des 2 veces al botón porque si no se repite y la asistencia y sale que van más personas.</p>
</div>


<form id="formAsistencia">
    <button class="asistencias"type="submit" data-valor="true" id="si">Sí voy 👍</button>
    <button class="asistencias"type="submit" data-valor="false" id="no">No voy 👎</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cliente = supabase.createClient(
    "https://fjiabjaovullgvzchgxy.supabase.co",
    "sb_publishable_IKlz5qC_uerRcV9JD9qkwg_Q8wXIKxQ"
    );


// botones
const btnSi = document.getElementById("si");
const btnNo = document.getElementById("no");

// función
async function guardar(valor) {
        console.log("Click detectado:", valor);

        const { error } = await cliente
            .from("asistencias")
            .insert([{ asiste: valor }]);

        if (error) {
            console.log(error);
            alert("Error 😢");
        } else {
            alert(valor ? "Confirmaste que vas a ir" : "Ok, no pasa nada, gracias por avisar");
        }
    }

    btnSi.addEventListener("click", (e) => {
        e.preventDefault(); // 🔥 IMPORTANTE
        guardar(true);
    });

    btnNo.addEventListener("click", (e) => {
        e.preventDefault(); // 🔥 IMPORTANTE
        guardar(false);
    });
});
</script>

</body>
</html>
