<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Feliz.css">
    <title>Asistencia</title>
</head>
<body>

<div>
    <h1>Confirme su asistencia</h1>
    <p>¿Vas a asistir al cumpleaños?</p>
    <p>Por favor, confirma tu asistencia para ayudar a planear el evento. No es necesario que respondas ahora mismo, pero antes si es antes del 25 de mayo mejor.</p>
</div>


<form id="formAsistencia">
    <button type="submit" data-valor="true" id="si">Sí voy </button>
    <button type="submit" data-valor="false" id="no">No voy </button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cliente = supabase.createClient(
    "https://fjiabjaovullgvzchgxy.supabase.co",
    "sb_publishable_IKlz5qC_uerRcV9JD9qkwg_Q8wXIKxQ"
    );
});

// botones
const btnSi = document.getElementById("si");
const btnNo = document.getElementById("no");

// función
async function guardar(valor) {
    console.log("Click detectado:", valor); // 🔥 para debug

    const { error } = await cliente
        .from("asistencia")
        .insert([{ asiste: valor }]);

    if (error) {
        console.log(error);
        alert("Error 😢");
    } else {
        alert(valor ? "Confirmaste 🎉" : "Ok 👍");
    }
}

// eventos
btnSi.addEventListener("click", () => guardar(true));
btnNo.addEventListener("click", () => guardar(false));

</script>

</body>
</html>
