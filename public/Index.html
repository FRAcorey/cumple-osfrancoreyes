        <h1 class="Titulo-P">Bienvenidos familia, (amigaso, fiera, socio, bro)</h1>
        <h1>Este lugar esta diseñado para subir las fotos que te saques, "si te sacas fotos", aquí quedara registrado lo que pase en la festejación. PD: A mi no me vas a poder sacar ni una como la gente 🤡🤡</h1>
        <div class ="Links">
            <button onclick="location.href='/Fotos'">Ir a Fotos📸</button>
        </div>

        <script>
const fechaObjetivo = new Date("2026-05-30T20:00:00").getTime();

const contador = document.getElementById("contador");

setInterval(() => {
    const ahora = new Date().getTime();
    const diferencia = fechaObjetivo - ahora;

    if (diferencia <= 0) {
        contador.innerHTML = "🎉 ¡Llegó el día!";
        return;
    }

    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
    const segundos = Math.floor((diferencia / 1000) % 60);

    contador.innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;
        }, 1000);
        </script>
        
</body>
